<!DOCTYPE html>
<html>
<head>
  <title>FieldSync AI Dashboard</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    h2 {
      text-align: center;
    }

    form {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #reports {
      max-width: 900px;
      margin: auto;
      padding: 0;
    }

    li {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      list-style: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .field {
      margin-bottom: 8px;
    }

    .label {
      font-weight: bold;
      color: #444;
    }

    .ai-box {
      margin-top: 15px;
      padding: 12px;
      background: #e9f7ef;
      border-left: 4px solid #2ecc71;
      border-radius: 4px;
      white-space: pre-line;
    }

    .location {
      color: #666;
      font-size: 14px;
    }

  </style>

</head>

<body>

<h1>FieldSync AI Reports</h1>

<h2>Submit New Report</h2>

<form id="reportForm">

  <label>Type</label>
  <input type="text" id="type" required>

  <label>Category</label>
  <input type="text" id="category" required>

  <label>Location</label>
  <input type="text" id="location" required>

  <label>Description</label>
  <textarea id="description" required></textarea>

  <button id="submitBtn" type="submit">Submit Report</button>

</form>

<ul id="reports"></ul>

<script>

async function loadReports() {

  try {

    const res = await fetch("/api/reports");
    const data = await res.json();

    const list = document.getElementById("reports");
    list.innerHTML = "";

    data.data.forEach(report => {

      const item = document.createElement("li");

      item.innerHTML = `
        <div class="field">
          <span class="label">Type:</span> ${report.type}
        </div>

        <div class="field">
          <span class="label">Category:</span> ${report.category}
        </div>

        <div class="field location">
          Location: ${report.location}
        </div>

        <div class="field">
          <span class="label">Description:</span><br>
          ${report.description}
        </div>

        <div class="ai-box">
          <strong>AI Recommendation</strong><br><br>
          ${report.ai_analysis || "Analysis pending..."}
        </div>
      `;

      list.appendChild(item);

    });

  } catch (error) {

    console.error("Failed to load reports");

  }

}


document.getElementById("reportForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;

  const report = {
    type: document.getElementById("type").value,
    category: document.getElementById("category").value,
    location: document.getElementById("location").value,
    description: document.getElementById("description").value
  };

  try {

    const res = await fetch("/api/report", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(report)
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Submission failed");
    }

    alert("Report submitted successfully!");

    document.getElementById("reportForm").reset();

    loadReports();

  } catch (error) {

    alert("Error submitting report");

  }

  btn.disabled = false;

});

loadReports();

</script>

</body>
</html>
