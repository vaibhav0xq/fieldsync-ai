<!DOCTYPE html>
<html>
<head>

<title>FieldSync AI</title>
<link rel="stylesheet" href="/style.css">

</head>

<body>

<div id="connectionStatus" style="text-align:center;margin-bottom:20px;font-weight:bold;">
Online
</div>

<h1>FieldSync AI</h1>

<a href="/dashboard.html">
<button>View Reports</button>
</a>

<div class="container">

<h2>Submit Field Report</h2>

<form id="reportForm">

<label>Type</label>
<input id="type" required>

<label>Category</label>
<input id="category" required>

<label>Location</label>
<input id="location" required>

<label>Description</label>
<textarea id="description" required></textarea>

<label>Upload Image</label>
<input type="file" id="image">

<button id="submitBtn" type="submit">Submit Report</button>

</form>

</div>

<script>

const form = document.getElementById("reportForm")
const btn = document.getElementById("submitBtn")

const OFFLINE_QUEUE_KEY = "offlineReports"


/* ------------------------------
QUEUE STATUS UI
------------------------------ */

function updateQueueStatus(){

  const status = document.getElementById("connectionStatus")
  const queue = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)) || []

  if(!navigator.onLine){

    status.innerText = `Offline Mode (${queue.length} report${queue.length!==1?"s":""} waiting to sync)`
    status.style.color = "red"

  }else{

    if(queue.length>0){

      status.innerText = `Online (${queue.length} report${queue.length!==1?"s":""} syncing)`
      status.style.color = "orange"

    }else{

      status.innerText = "Online"
      status.style.color = "green"

    }

  }

}


/* ------------------------------
NETWORK EVENTS
------------------------------ */

window.addEventListener("online",()=>{
  updateQueueStatus()
  syncOfflineReports()
})

window.addEventListener("offline",updateQueueStatus)

updateQueueStatus()


/* ------------------------------
OFFLINE STORAGE
------------------------------ */

function getOfflineReports(){

  return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)) || []

}

function saveOfflineReport(report){

  const queue = getOfflineReports()

  queue.push(report)

  localStorage.setItem(
    OFFLINE_QUEUE_KEY,
    JSON.stringify(queue)
  )

  updateQueueStatus()

}


/* ------------------------------
IMAGE → BASE64
------------------------------ */

function fileToBase64(file){

  return new Promise((resolve)=>{

    const reader = new FileReader()

    reader.onload = ()=> resolve(reader.result)

    reader.readAsDataURL(file)

  })

}


/* ------------------------------
BASE64 → BLOB
------------------------------ */

async function base64ToBlob(base64){

  const res = await fetch(base64)

  return await res.blob()

}


/* ------------------------------
SYNC OFFLINE REPORTS
------------------------------ */

async function syncOfflineReports(){

  const reports = getOfflineReports()

  if(reports.length===0){
    return
  }

  console.log("Syncing offline reports...")

  for(const report of reports){

    const formData = new FormData()

    formData.append("type",report.type)
    formData.append("category",report.category)
    formData.append("location",report.location)
    formData.append("description",report.description)

    if(report.image){

      const blob = await base64ToBlob(report.image)

      formData.append("image",blob,"offline.jpg")

    }

    await fetch("/api/report",{
      method:"POST",
      body:formData
    })

  }

  localStorage.removeItem(OFFLINE_QUEUE_KEY)

  updateQueueStatus()

  alert("Offline reports synced successfully!")

}


/* ------------------------------
FORM SUBMIT
------------------------------ */

form.addEventListener("submit", async function(e){

  e.preventDefault()

  btn.innerText="Submitting..."
  btn.disabled=true

  const type=document.getElementById("type").value
  const category=document.getElementById("category").value
  const location=document.getElementById("location").value
  const description=document.getElementById("description").value

  const image=document.getElementById("image").files[0]

/* ------------------------------
OFFLINE MODE
------------------------------ */

  if(!navigator.onLine){

    let imageBase64=null

    if(image){
      imageBase64=await fileToBase64(image)
    }

    saveOfflineReport({
      type,
      category,
      location,
      description,
      image:imageBase64
    })

    alert("No internet. Report saved offline.")

    form.reset()

    btn.innerText="Submit Report"
    btn.disabled=false

    return
  }

/* ------------------------------
ONLINE MODE
------------------------------ */

  const formData=new FormData()

  formData.append("type",type)
  formData.append("category",category)
  formData.append("location",location)
  formData.append("description",description)

  if(image){
    formData.append("image",image)
  }

  await fetch("/api/report",{
    method:"POST",
    body:formData
  })

  alert("Report submitted successfully")

  form.reset()

  btn.innerText="Submit Report"
  btn.disabled=false

})


/* ------------------------------
SYNC ON PAGE LOAD
------------------------------ */

if(navigator.onLine){
  syncOfflineReports()
}

</script>

</body>
</html>
